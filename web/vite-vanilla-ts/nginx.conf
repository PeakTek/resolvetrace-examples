server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hashed Vite assets are immutable; cache them hard.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback. For this demo there is only one route (`/`) but this
    # makes the config copy-safe for future examples that add routing.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Basic security headers. CSP is intentionally permissive — the demo
    # just talks to one ingest endpoint, and tightening it is an exercise
    # for real deployments.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Don't expose nginx version.
    server_tokens off;
}
